# Minimal docker-compose with vanilla PostgreSQL images (no spock extension).
# Used by TestNativePG_* tests to verify that table-diff and table-repair
# work without the spock extension.
services:
  native-n1:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: testdb
    command:
      - "postgres"
      - "-c"
      - "track_commit_timestamp=on"
      - "-c"
      - "wal_level=logical"
    ports:
      - "5432"
  native-n2:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: testdb
    command:
      - "postgres"
      - "-c"
      - "track_commit_timestamp=on"
      - "-c"
      - "wal_level=logical"
    ports:
      - "5432"
  native-n3:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: testdb
    command:
      - "postgres"
      - "-c"
      - "track_commit_timestamp=on"
      - "-c"
      - "wal_level=logical"
    ports:
      - "5432"
